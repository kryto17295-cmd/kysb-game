<!DOCTYPE html>
<html>
<head>
    <title>KYSb Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            color: white;
        }
        #login-screen h1 { font-size: 36px; color: #9b59b6; }
        #login-screen p { color: #aaa; }
        #login-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #login-btn:hover { background: #4752c4; }

        #game-screen { display: none; flex-direction: column; align-items: center; gap: 10px; }

        #hud {
            display: flex;
            align-items: center;
            gap: 16px;
            color: white;
            font-size: 14px;
            width: 800px;
            justify-content: space-between;
        }
        #user-info { display: flex; align-items: center; gap: 8px; }
        #user-info img { width: 32px; height: 32px; border-radius: 50%; }
        #balance-display {
            background: #2c1654;
            border: 1px solid #9b59b6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 15px;
            color: #d7b4f3;
        }
        #logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        canvas { border: 2px solid #9b59b6; }

        #zone-tooltip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            display: none;
            border: 1px solid #9b59b6;
        }

        #fishing-ui {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #3498db;
        }
        #fishing-ui .fish-result {
            font-size: 20px;
            margin-top: 10px;
        }
        #fish-btn, #cancel-fish-btn {
            margin: 8px 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        #fish-btn { background: #3498db; color: white; }
        #cancel-fish-btn { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>KYSb Game</h1>
    <p>Войди через Discord чтобы играть</p>
    <button id="login-btn" onclick="window.location.href='/auth/login'">🎮 Войти через Discord</button>
</div>

<div id="game-screen">
    <div id="hud">
        <div id="user-info">
            <img id="user-avatar" src="" alt="">
            <span id="user-name"></span>
        </div>
        <div id="balance-display">💰 <span id="balance-val">0</span> кусиков</div>
        <button id="logout-btn" onclick="window.location.href='/auth/logout'">Выйти</button>
    </div>
    <canvas id="game" width="800" height="600"></canvas>
</div>

<div id="zone-tooltip"></div>
<div id="fishing-ui">
    <div class="fish-result" id="fish-text">🎣 Закидываем удочку...</div>
    <button id="fish-btn" onclick="startFishing()">🎣 Рыбачить</button>
    <button id="cancel-fish-btn" onclick="cancelFishing()">✖ Отмена</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket;
    let myId = null;
    const players = {};
    const keys = {};
    const SPEED = 3;
    const avatarCache = {};
    const textureCache = {};
    let isFishing = false;
    let currentUser = null;

    const ZONES = [
        { x: 50,  y: 30,  w: 160, h: 130, color: '#f1c40f', label: '🎰 Казино',  name: 'casino' },
        { x: 590, y: 30,  w: 160, h: 130, color: '#2ecc71', label: '🛒 Магазин', name: 'shop' },
        { x: 300, y: 430, w: 200, h: 140, color: '#3498db', label: '🎣 Рыбалка', name: 'fish' },
    ];

    function loadTexture(src) {
        if (textureCache[src]) return textureCache[src];
        const img = new Image();
        img.src = src;
        textureCache[src] = img;
        return img;
    }

    fetch('/auth/me')
        .then(r => r.json())
        .then(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                document.getElementById('user-name').textContent = user.username;
                document.getElementById('user-avatar').src = user.avatar;
                document.getElementById('balance-val').textContent = user.balance;
                startGame(user);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        });

    function loadAvatar(url) {
        if (avatarCache[url]) return avatarCache[url];
        const img = new Image();
        img.src = url;
        avatarCache[url] = img;
        return img;
    }

    function getZoneAt(x, y) {
        for (const z of ZONES) {
            if (x > z.x && x < z.x + z.w && y > z.y && y < z.y + z.h) return z;
        }
        return null;
    }

    function startFishing() {
        if (!socket || !currentUser) return;
        isFishing = true;
        document.getElementById('fish-btn').style.display = 'none';
        document.getElementById('cancel-fish-btn').style.display = 'inline-block';
        document.getElementById('fish-text').textContent = '🎣 Закидываем удочку...';
        document.getElementById('fishing-ui').style.display = 'block';
        socket.emit('startFishing', { discordId: currentUser.id });
    }

    function cancelFishing() {
        isFishing = false;
        socket.emit('cancelFishing');
        document.getElementById('fishing-ui').style.display = 'none';
        document.getElementById('fish-btn').style.display = 'inline-block';
        document.getElementById('cancel-fish-btn').style.display = 'none';
    }

    function startGame(user) {
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('zone-tooltip');
        socket = io();

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);

        socket.on('currentPlayers', (serverPlayers) => {
            myId = socket.id;
            Object.assign(players, serverPlayers);
            socket.emit('setProfile', { name: user.username, avatar: user.avatar, balance: user.balance });
        });

        socket.on('newPlayer', (data) => {
            players[data.id] = { x: data.x, y: data.y, name: data.name, avatar: data.avatar, balance: data.balance };
        });

        socket.on('playerUpdated', (data) => {
            if (players[data.id]) {
                if (data.name) players[data.id].name = data.name;
                if (data.avatar) players[data.id].avatar = data.avatar;
                if (data.balance !== undefined) players[data.id].balance = data.balance;
            }
        });

        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].x = data.x;
                players[data.id].y = data.y;
            }
        });

        socket.on('playerDisconnected', (id) => {
            delete players[id];
        });

        socket.on('fishingStarted', () => {
            document.getElementById('fish-text').textContent = '🎣 Клюёт! Ждём...';
        });

        socket.on('fishCaught', (data) => {
            isFishing = false;
            document.getElementById('fishing-ui').style.display = 'block';
            document.getElementById('fish-btn').style.display = 'inline-block';
            document.getElementById('cancel-fish-btn').style.display = 'none';
            document.getElementById('fish-text').textContent = `🎣 Поймал: ${data.fish}! +${data.price} кусиков`;
            document.getElementById('balance-val').textContent = data.balance;
        });

        socket.on('fishingError', (data) => {
            alert(data.message);
        });

        function update() {
            if (!myId || !players[myId]) return;
            let moved = false;
            if (keys['ArrowUp']    || keys['w'] || keys['W']) { players[myId].y -= SPEED; moved = true; }
            if (keys['ArrowDown']  || keys['s'] || keys['S']) { players[myId].y += SPEED; moved = true; }
            if (keys['ArrowLeft']  || keys['a'] || keys['A']) { players[myId].x -= SPEED; moved = true; }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) { players[myId].x += SPEED; moved = true; }

            players[myId].x = Math.max(20, Math.min(780, players[myId].x));
            players[myId].y = Math.max(20, Math.min(580, players[myId].y));

            if (moved) socket.emit('move', { x: players[myId].x, y: players[myId].y });

            const zone = getZoneAt(players[myId].x, players[myId].y);
            if (zone) {
                tooltip.textContent = `Вы в зоне: ${zone.label}`;
                tooltip.style.display = 'block';

                if (zone.name === 'fish' && !isFishing) {
                    document.getElementById('fishing-ui').style.display = 'block';
                    document.getElementById('fish-btn').style.display = 'inline-block';
                    document.getElementById('cancel-fish-btn').style.display = 'none';
                }
            } else {
                tooltip.style.display = 'none';
                if (!isFishing) {
                    document.getElementById('fishing-ui').style.display = 'none';
                }
            }
        }

        function drawZones(ctx) {
            // Казино
            const casino = loadTexture('/casino.png');
            if (casino.complete) ctx.drawImage(casino, 50, 20, 160, 130);
            else {
                ctx.fillStyle = '#f1c40f33'; ctx.fillRect(50, 30, 160, 130);
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.strokeRect(50, 30, 160, 130);
            }

            // Магазин
            const shop = loadTexture('/shop.png');
            if (shop.complete) ctx.drawImage(shop, 590, 20, 160, 130);
            else {
                ctx.fillStyle = '#2ecc7133'; ctx.fillRect(590, 30, 160, 130);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.strokeRect(590, 30, 160, 130);
            }

            // Водоём
            const water = loadTexture('/water.png');
            if (water.complete) {
                for (let wy = 430; wy < 570; wy += 32) {
                    for (let wx = 300; wx < 500; wx += 32) {
                        ctx.drawImage(water, wx, wy, 32, 32);
                    }
                }
            } else {
                ctx.fillStyle = '#3498db33'; ctx.fillRect(300, 430, 200, 140);
                ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2; ctx.strokeRect(300, 430, 200, 140);
            }

            // Подписи
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#f1c40f'; ctx.fillText('🎰 Казино', 130, 18);
            ctx.fillStyle = '#2ecc71'; ctx.fillText('🛒 Магазин', 670, 18);
            ctx.fillStyle = '#3498db'; ctx.fillText('🎣 Рыбалка', 400, 422);
        }

        function drawPlayer(ctx, p, isMe) {
            const x = p.x, y = p.y;

            ctx.fillStyle = isMe ? '#9b59b6' : '#e74c3c';
            ctx.fillRect(x - 12, y - 20, 24, 28);

            ctx.fillStyle = isMe ? '#7d3c98' : '#c0392b';
            ctx.fillRect(x - 10, y + 8, 8, 10);
            ctx.fillRect(x + 2,  y + 8, 8, 10);

            if (p.avatar) {
                const img = loadAvatar(p.avatar);
                if (img.complete) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(x, y - 28, 14, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(img, x - 14, y - 42, 28, 28);
                    ctx.restore();
                    ctx.beginPath();
                    ctx.arc(x, y - 28, 14, 0, Math.PI * 2);
                    ctx.strokeStyle = isMe ? '#9b59b6' : '#e74c3c';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeText(p.name || 'Игрок', x, y - 48);
            ctx.fillStyle = 'white';
            ctx.fillText(p.name || 'Игрок', x, y - 48);

            if (p.balance > 0) {
                ctx.font = '11px Arial';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                const balText = `💰 ${p.balance}`;
                ctx.strokeText(balText, x, y - 60);
                ctx.fillStyle = '#f1c40f';
                ctx.fillText(balText, x, y - 60);
            }
        }

        function draw() {
            const grass = loadTexture('/grass.png');
            if (grass.complete) {
                for (let gy = 0; gy < 600; gy += 32) {
                    for (let gx = 0; gx < 800; gx += 32) {
                        ctx.drawImage(grass, gx, gy, 32, 32);
                    }
                }
            } else {
                ctx.fillStyle = '#16213e';
                ctx.fillRect(0, 0, 800, 600);
            }

            drawZones(ctx);

            for (const id in players) {
                drawPlayer(ctx, players[id], id === myId);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    }
</script>
</body>
</html>
