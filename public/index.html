<!DOCTYPE html>
<html>
<head>
    <title>KYSb Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }

        #login-screen {
            display: flex; flex-direction: column; align-items: center; gap: 20px; color: white;
        }
        #login-screen h1 { font-size: 36px; color: #9b59b6; }
        #login-screen p { color: #aaa; }
        #login-btn {
            background: #5865F2; color: white; border: none; padding: 14px 28px;
            border-radius: 8px; font-size: 18px; cursor: pointer;
        }
        #login-btn:hover { background: #4752c4; }

        #game-screen { display: none; position: relative; }

        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; align-items: center; gap: 12px; color: white; font-size: 14px;
            justify-content: space-between; z-index: 10; pointer-events: none;
        }
        #hud > * { pointer-events: auto; }
        #user-info { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; }
        #user-info img { width: 32px; height: 32px; border-radius: 50%; }
        #balance-display { background: rgba(44, 22, 84, 0.9); border: 1px solid #9b59b6; padding: 6px 14px; border-radius: 20px; font-size: 15px; color: #d7b4f3; }
        #inventory-display { background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; font-size: 13px; color: #aaa; }
        #logout-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }

        canvas { display: block; }

        #fishing-ui {
            display: none; position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.95); color: white; padding: 20px 30px; border-radius: 16px;
            text-align: center; border: 2px solid #3498db; z-index: 20; width: 400px;
        }
        #fishing-bar-container {
            width: 300px; height: 24px; background: #1a1a2e; border-radius: 12px;
            margin: 15px auto; position: relative; overflow: hidden; border: 2px solid #333;
        }
        #fishing-target {
            position: absolute; top: 0; height: 100%; width: 60px;
            background: rgba(46, 204, 113, 0.4); border-radius: 12px;
            transition: left 0.1s;
        }
        #fishing-indicator {
            position: absolute; top: -2px; width: 8px; height: 28px;
            background: #fff; border-radius: 4px; transition: left 0.05s;
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }
        #fishing-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }

        #chat-container {
            position: absolute; bottom: 10px; left: 10px; width: 300px; max-height: 150px;
            overflow-y: auto; z-index: 10; pointer-events: none;
        }
        .chat-msg { color: white; font-size: 13px; text-shadow: 1px 1px 2px black; margin: 2px 0; opacity: 0.9; }
        .chat-name { color: #9b59b6; font-weight: bold; }

        #zone-tooltip {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 8px 16px;
            border-radius: 8px; font-size: 16px; display: none; z-index: 15;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>KYSb Game</h1>
    <p>Войди через Discord чтобы играть</p>
    <button id="login-btn" onclick="window.location.href='/auth/login'">🎮 Войти через Discord</button>
</div>

<div id="game-screen">
    <div id="hud">
        <div id="user-info">
            <img id="user-avatar" src="" alt="">
            <span id="user-name"></span>
        </div>
        <div id="balance-display">💰 <span id="balance-val">0</span> кусиков</div>
        <div id="inventory-display">🎒 <span id="inv-count">0</span> предметов</div>
        <button id="logout-btn" onclick="window.location.href='/auth/logout'">Выйти</button>
    </div>
    <canvas id="game"></canvas>
    <div id="zone-tooltip"></div>
    <div id="chat-container"></div>

    <div id="fishing-ui">
        <div id="fishing-text">🎣 Ловись рыбка!</div>
        <div id="fishing-bar-container">
            <div id="fishing-target"></div>
            <div id="fishing-indicator"></div>
        </div>
        <div id="fishing-instruction">Нажимай ПРОБЕЛ чтобы удержать в зелёной зоне!</div>
        <div id="fishing-timer">⏱ 5.0с</div>
        <button id="fishing-btn" onclick="closeFishing()">✖ Закрыть</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let socket;
    let myId = null;
    const players = {};
    const keys = {};
    const SPEED = 4;
    const avatarCache = {};
    const textureCache = {};
    let camera = { x: 0, y: 0 };
    let currentUser = null;
    let mapData = null;
    let fishingActive = false;
    let fishingData = null;
    let fishingIndicatorPos = 150;
    let fishingTargetPos = 150;
    let fishingTimer = 5;
    let fishingInterval = null;
    let chatMessages = [];

    function loadTexture(src) {
        if (textureCache[src]) return textureCache[src];
        const img = new Image();
        img.src = src;
        textureCache[src] = img;
        return img;
    }

    function loadAvatar(url) {
        if (avatarCache[url]) return avatarCache[url];
        const img = new Image();
        img.src = url;
        avatarCache[url] = img;
        return img;
    }

    // Авторизация
    fetch('/auth/me')
        .then(r => r.json())
        .then(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('user-name').textContent = user.username;
                document.getElementById('user-avatar').src = user.avatar;
                document.getElementById('balance-val').textContent = user.balance;
                document.getElementById('inv-count').textContent = (user.inventory || []).length;
                startGame(user);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        });

    function startGame(user) {
        socket = io();

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && fishingActive) {
                e.preventDefault();
                fishingIndicatorPos = Math.max(0, fishingIndicatorPos - 8);
            }
            if (e.key === 'Enter') {
                const input = prompt('Чат:');
                if (input && input.trim()) {
                    socket.emit('chatMessage', { text: input.trim() });
                }
            }
        });
        document.addEventListener('keyup', e => {
            keys[e.key] = false;
        });

        socket.on('mapData', (data) => {
            mapData = data;
            camera.x = data.cityCenter.x - canvas.width / 2;
            camera.y = data.cityCenter.y - canvas.height / 2;
        });

        socket.on('currentPlayers', (serverPlayers) => {
            myId = socket.id;
            for (const id in players) delete players[id];
            Object.assign(players, serverPlayers);
            socket.emit('setProfile', {
                name: user.username, avatar: user.avatar, balance: user.balance,
                discordId: user.id, inventory: user.inventory || []
            });
        });

        socket.on('newPlayer', (data) => {
            players[data.id] = { x: data.x, y: data.y, name: data.name, avatar: data.avatar, balance: data.balance, inventory: data.inventory, dir: 'down' };
        });

        socket.on('playerUpdated', (data) => {
            if (players[data.id]) {
                if (data.name) players[data.id].name = data.name;
                if (data.avatar) players[data.id].avatar = data.avatar;
                if (data.balance !== undefined) players[data.id].balance = data.balance;
                if (data.inventory) players[data.id].inventory = data.inventory;
            }
        });

        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].targetX = data.x;
                players[data.id].targetY = data.y;
                players[data.id].dir = data.dir;
            }
        });

        socket.on('playerDisconnected', (id) => { delete players[id]; });

        socket.on('duplicateSession', () => { alert('Ты зашёл с другой вкладки. Эта сессия закрыта.'); });

        // Чат
        socket.on('chatMessage', (data) => {
            chatMessages.push({ name: data.name, text: data.text, time: Date.now() });
            if (chatMessages.length > 20) chatMessages.shift();
        });

        // Рыбалка
        socket.on('fishingError', (data) => { alert(data.message); });

        socket.on('fishingGame', (data) => {
            fishingActive = true;
            fishingData = data;
            fishingIndicatorPos = 150;
            fishingTargetPos = 60 + Math.random() * 180;
            fishingTimer = 5;
            document.getElementById('fishing-ui').style.display = 'block';
            document.getElementById('fishing-text').textContent = `🎣 Ловим: ${data.fish}!`;
            document.getElementById('fishing-timer').textContent = `⏱ ${fishingTimer.toFixed(1)}с`;

            fishingInterval = setInterval(() => {
                fishingTimer -= 0.05;
                document.getElementById('fishing-timer').textContent = `⏱ ${fishingTimer.toFixed(1)}с`;

                fishingTargetPos += (Math.random() - 0.5) * 15;
                fishingTargetPos = Math.max(20, Math.min(260, fishingTargetPos));
                document.getElementById('fishing-target').style.left = fishingTargetPos + 'px';

                fishingIndicatorPos += 3;
                fishingIndicatorPos = Math.max(0, Math.min(292, fishingIndicatorPos));
                document.getElementById('fishing-indicator').style.left = fishingIndicatorPos + 'px';

                if (fishingTimer <= 0) {
                    clearInterval(fishingInterval);
                    fishingActive = false;
                    document.getElementById('fishing-ui').style.display = 'none';
                    const caught = Math.abs(fishingIndicatorPos - fishingTargetPos - 30) < 40;
                    socket.emit('fishResult', { caught, fish: data.fish, price: data.price });
                }
            }, 50);
        });

        socket.on('fishCaught', (data) => {
            document.getElementById('balance-val').textContent = data.balance;
            document.getElementById('inv-count').textContent = (data.inventory || []).length;
        });

        socket.on('fishLost', (data) => {
            alert(`😢 ${data.fish} сорвался!`);
        });

        gameLoop();
    }

    function closeFishing() {
        if (fishingInterval) clearInterval(fishingInterval);
        fishingActive = false;
        document.getElementById('fishing-ui').style.display = 'none';
    }

    function update() {
        if (!myId || !players[myId]) return;
        const me = players[myId];
        let dx = 0, dy = 0, moved = false;
        if (keys['w'] || keys['W'] || keys['ArrowUp'])    { dy = -SPEED; moved = true; me.dir = 'up'; }
        if (keys['s'] || keys['S'] || keys['ArrowDown'])  { dy = SPEED;  moved = true; me.dir = 'down'; }
        if (keys['a'] || keys['A'] || keys['ArrowLeft'])  { dx = -SPEED; moved = true; me.dir = 'left'; }
        if (keys['d'] || keys['D'] || keys['ArrowRight']) { dx = SPEED;  moved = true; me.dir = 'right'; }

        if (moved) {
            me.x = Math.max(10, Math.min((mapData?.mapW || 2000) - 10, me.x + dx));
            me.y = Math.max(10, Math.min((mapData?.mapH || 1500) - 10, me.y + dy));
            socket.emit('move', { x: me.x, y: me.y, dir: me.dir });
        }

        // Камера
        camera.x += (me.x - canvas.width / 2 - camera.x) * 0.1;
        camera.y += (me.y - canvas.height / 2 - camera.y) * 0.1;

        // Зоны
        if (mapData) {
            const tooltip = document.getElementById('zone-tooltip');
            let inZone = false;
            for (const z of mapData.fishingZones) {
                if (me.x > z.x && me.x < z.x + z.w && me.y > z.y && me.y < z.y + z.h) {
                    tooltip.textContent = `Вы в зоне: ${z.label} — нажми F чтобы рыбачить`;
                    tooltip.style.display = 'block';
                    inZone = true;
                    if (keys['f'] || keys['F']) {
                        keys['f'] = false;
                        keys['F'] = false;
                        socket.emit('startFishing', {});
                    }
                }
            }
            for (const b of mapData.buildings) {
                if (me.x > b.x && me.x < b.x + b.w && me.y > b.y && me.y < b.y + b.h) {
                    tooltip.textContent = `Вы в зоне: ${b.label}`;
                    tooltip.style.display = 'block';
                    inZone = true;
                }
            }
            if (!inZone) tooltip.style.display = 'none';
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!mapData) {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Загрузка карты...', canvas.width / 2, canvas.height / 2);
            return;
        }

        const grass = loadTexture('/grass.png');

        // Трава
        const startTX = Math.floor(camera.x / 32) * 32;
        const startTY = Math.floor(camera.y / 32) * 32;
        for (let gy = startTY; gy < camera.y + canvas.height + 32; gy += 32) {
            for (let gx = startTX; gx < camera.x + canvas.width + 32; gx += 32) {
                const sx = gx - camera.x;
                const sy = gy - camera.y;
                if (grass.complete) {
                    ctx.drawImage(grass, sx, sy, 32, 32);
                } else {
                    ctx.fillStyle = (Math.floor(gx / 32) + Math.floor(gy / 32)) % 2 === 0 ? '#2d5a27' : '#2a5424';
                    ctx.fillRect(sx, sy, 32, 32);
                }
            }
        }

        // Деревья
        const treeImg = loadTexture('/tree.png');
        const bushImg = loadTexture('/kyst.png');
        for (const t of mapData.trees) {
            if (t.x > camera.x - 50 && t.x < camera.x + canvas.width + 50 &&
                t.y > camera.y - 50 && t.y < camera.y + canvas.height + 50) {
                const img = t.type === 'tree' ? treeImg : bushImg;
                const sx = t.x - camera.x;
                const sy = t.y - camera.y;
                if (img.complete) {
                    ctx.drawImage(img, sx - 16, sy - 24, 32, 32);
                } else {
                    ctx.fillStyle = t.type === 'tree' ? '#1a5c1a' : '#2d8a2d';
                    ctx.beginPath();
                    ctx.arc(sx, sy, t.type === 'tree' ? 16 : 10, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Здания
        const casinoImg = loadTexture('/casino.png');
        const shopImg = loadTexture('/shop.png');
        for (const b of mapData.buildings) {
            const sx = b.x - camera.x;
            const sy = b.y - camera.y;
            const img = b.type === 'casino' ? casinoImg : shopImg;
            if (img.complete) {
                ctx.drawImage(img, sx, sy, b.w, b.h);
            } else {
                ctx.fillStyle = b.type === 'casino' ? '#f1c40f33' : '#2ecc7133';
                ctx.fillRect(sx, sy, b.w, b.h);
                ctx.strokeStyle = b.type === 'casino' ? '#f1c40f' : '#2ecc71';
                ctx.lineWidth = 2;
                ctx.strokeRect(sx, sy, b.w, b.h);
            }
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.fillText(b.label, sx + b.w / 2, sy - 8);
        }

        // Водоёмы
        const waterImg = loadTexture('/water.png');
        for (const z of mapData.fishingZones) {
            for (let wy = z.y; wy < z.y + z.h; wy += 32) {
                for (let wx = z.x; wx < z.x + z.w; wx += 32) {
                    const sx = wx - camera.x;
                    const sy = wy - camera.y;
                    if (waterImg.complete) {
                        ctx.drawImage(waterImg, sx, sy, 32, 32);
                    } else {
                        ctx.fillStyle = '#2980b9';
                        ctx.fillRect(sx, sy, 32, 32);
                    }
                }
            }
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.fillText(z.label, z.x + z.w / 2 - camera.x, z.y - 10 - camera.y);
        }

        // Игроки
        for (const id in players) {
            const p = players[id];
            const sx = p.x - camera.x;
            const sy = p.y - camera.y;
            const isMe = id === myId;

            // Плавное движение к цели
            if (p.targetX && Math.abs(p.x - p.targetX) > 1) {
                p.x += (p.targetX - p.x) * 0.3;
            }
            if (p.targetY && Math.abs(p.y - p.targetY) > 1) {
                p.y += (p.targetY - p.y) * 0.3;
            }
            const drawX = p.targetX ? p.x : p.x;
            const drawY = p.targetY ? p.y : p.y;
            const dsx = drawX - camera.x;
            const dsy = drawY - camera.y;

            ctx.fillStyle = isMe ? '#9b59b6' : '#e74c3c';
            ctx.fillRect(dsx - 12, dsy - 20, 24, 28);
            ctx.fillStyle = isMe ? '#7d3c98' : '#c0392b';
            ctx.fillRect(dsx - 10, dsy + 8, 8, 10);
            ctx.fillRect(dsx + 2, dsy + 8, 8, 10);

            if (p.avatar) {
                const img = loadAvatar(p.avatar);
                if (img.complete) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(dsx, dsy - 28, 14, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(img, dsx - 14, dsy - 42, 28, 28);
                    ctx.restore();
                    ctx.beginPath();
                    ctx.arc(dsx, dsy - 28, 14, 0, Math.PI * 2);
                    ctx.strokeStyle = isMe ? '#9b59b6' : '#e74c3c';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeText(p.name || 'Игрок', dsx, dsy - 48);
            ctx.fillStyle = 'white';
            ctx.fillText(p.name || 'Игрок', dsx, dsy - 48);

            if (p.balance > 0) {
                ctx.font = '11px Arial';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.strokeText('💰 ' + p.balance, dsx, dsy - 60);
                ctx.fillStyle = '#f1c40f';
                ctx.fillText('💰 ' + p.balance, dsx, dsy - 60);
            }
        }

        // Чат
        const chatDiv = document.getElementById('chat-container');
        const now = Date.now();
        chatMessages = chatMessages.filter(m => now - m.time < 10000);
        chatDiv.innerHTML = chatMessages.map(m =>
            `<div class="chat-msg"><span class="chat-name">${m.name}:</span> ${m.text}</div>`
        ).join('');
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
